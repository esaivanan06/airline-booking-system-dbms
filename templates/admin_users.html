<h2>All Users</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
    <th>Role</th>
    <th>Created At</th>
</tr>

{% for u in users %}
<tr>
    <td>{{ u.user_id }}</td>
    <td>{{ u.username }}</td>
    <td>{{ u.email }}</td>
    <td>{{ u.role }}</td>
    <td>{{ u.created_at }}</td>
</tr>
{% endfor %}
</table>
