{% extends 'base.html' %}
{% block content %}

<h2>Edit Schedule</h2>

<form method="POST">

    <select name="flight_id" required>
        {% for f in flights %}
            <option value="{{ f.flight_id }}"
                {% if f.flight_id == schedule.flight_id %}
                    selected
                {% endif %}>
                {{ f.flight_number }}
            </option>
        {% endfor %}
    </select>

    <select name="aircraft_id" required>
        {% for a in aircrafts %}
            <option value="{{ a.aircraft_id }}"
                {% if a.aircraft_id == schedule.aircraft_id %}
                    selected
                {% endif %}>
                {{ a.model }}
            </option>
        {% endfor %}
    </select>

<input type="datetime-local"
       name="departure_time"
       value="{{ schedule.departure_time|datetimeformat }}"
       required>

<input type="datetime-local"
       name="arrival_time"
       value="{{ schedule.arrival_time|datetimeformat }}"
       required>

    <input type="number"
           step="0.01"
           name="price"
           value="{{ schedule.price }}"
           required>

    <button type="submit"
            class="primary-btn">
        Update Schedule
    </button>
</form>

{% endblock %}
